<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admission Form</title>
  </head>
  <body>
    <h1>Student Admission Form</h1>

    <form>
      <label for="">Student Name</label>
      <input type="text" required minlength="3" />

      <br /><br />

      <label for="">Student Email</label>
      <input type="email" required />

      <br /><br />

      <label for="">Date of Birth</label>
      <input type="date" />

      <br /><br />

      <label for="">Gender</label>
      <input type="radio" name="gender" /> Male
      <input type="radio" name="gender" /> Female

      <br /><br />

      <label for="">Select Course</label>
      <select>
        <option>MERN Stack Development</option>
        <option>Data Analytics</option>
        <option>Data Science</option>
        <option>Artificial Intelligence</option>
      </select>

      <br /><br />

      <label for="">Select College</label>
      <input type="text" list="college" />

      <datalist id="college">
        <option>Amity College</option>
        <option>MGIMT</option>
        <option>BIET</option>
        <option>SRMCEM</option>
      </datalist>

      <br /><br />

      <label for="">Address</label>
      <textarea rows="4" cols="20"></textarea>

      <br /><br />

      <input type="checkbox" id="terms" />
      <label for="terms"> I Accept Terms and Conditions</label>

      <br /><br />

      <details>
        <summary>View Terms and Conditions</summary>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Beatae
          repellendus placeat officiis distinctio molestias consequatur deleniti
          optio veniam! Nulla, repudiandae!
        </p>
      </details>

      <br /><br />

      <button>Submit</button>
    </form>
  </body>
</html>
